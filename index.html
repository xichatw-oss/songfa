<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>崧發茶園 管理系統</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;
  --bg2:#EDE8E0;
  --card:#FFFFFF;
  --border:#D9D2C5;
  --text:#2C2416;
  --text2:#7A6E5F;
  --text3:#B0A898;
  --green:#2D6A4F;
  --green-l:#E8F3EE;
  --green-t:#1B4332;
  --amber:#8B5E00;
  --amber-l:#FDF3DC;
  --red:#8B1A1A;
  --red-l:#FDEAEA;
  --radius:10px;
  --radius-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Topbar */
.topbar{background:var(--green);padding:14px 16px 0;position:sticky;top:0;z-index:50;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.topbar-logo{display:flex;align-items:center;gap:8px;}
.topbar-leaf{font-size:20px;}
.topbar-name{font-size:17px;font-weight:600;color:#fff;letter-spacing:.5px;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);}
.sync-btn{background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sync-btn:active{background:rgba(255,255,255,.25);}
.tab-row{display:flex;}
.tab{flex:1;text-align:center;padding:9px 2px 8px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.active{color:#fff;border-bottom-color:#fff;font-weight:500;}

/* Content */
.content{flex:1;padding:14px 12px;display:none;}
.content.active{display:block;}

/* Loading */
.loading{text-align:center;padding:40px 20px;color:var(--text2);}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;margin:0 4px;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.error-box{background:var(--red-l);border:1px solid #f5c6c6;border-radius:var(--radius);padding:12px;margin:8px 0;font-size:13px;color:var(--red);}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid var(--border);}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:600;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.stat-value.green{color:var(--green);}
.stat-value.amber{color:var(--amber);}
.stat-value.red{color:var(--red);}

/* Chart */
.chart-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px;margin-bottom:10px;}
.chart-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;}
.month-chart{display:flex;align-items:flex-end;gap:5px;height:80px;}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.month-bar{width:100%;border-radius:3px 3px 0 0;}
.month-lbl{font-size:9px;color:var(--text3);}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-lbl{font-size:11px;color:var(--text2);width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-bg{flex:1;height:18px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;}
.bar-val{font-size:10px;font-weight:500;color:#fff;}
.donut-row{display:flex;align-items:center;gap:16px;}
.legend{flex:1;display:flex;flex-direction:column;gap:6px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Search */
.search-wrap{display:flex;gap:8px;margin-bottom:10px;}
.search-wrap input{flex:1;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);font-size:13px;color:var(--text);outline:none;}
.search-wrap input:focus{border-color:var(--green);}

/* Filter chips */
.chips{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;}
.chip.active{background:var(--green-l);color:var(--green-t);border-color:#a8d5be;font-weight:500;}

/* Record cards */
.rec-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:13px 14px;margin-bottom:8px;}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.rec-name{font-size:14px;font-weight:500;color:var(--text);}
.rec-amount{font-size:15px;font-weight:600;color:var(--green);}
.rec-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.rec-detail{font-size:11px;color:var(--text2);}
.rec-addr{font-size:11px;color:var(--text2);margin:3px 0;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.b-done{background:var(--green-l);color:var(--green-t);}
.b-pending{background:var(--amber-l);color:var(--amber);}
.b-cancel{background:var(--red-l);color:var(--red);}

/* Customer avatar */
.cust-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);padding:13px 14px;margin-bottom:8px;}
.cust-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--green-t);flex-shrink:0;}
.cust-name{font-size:14px;font-weight:500;color:var(--text);}
.cust-phone{font-size:12px;color:var(--text2);}
.cust-note{font-size:11px;color:var(--text2);margin-top:2px;}

/* FAB */
.fab-wrap{position:fixed;bottom:24px;right:calc(50% - 215px + 12px);z-index:40;}
@media(max-width:430px){.fab-wrap{right:16px;}}
.fab{width:50px;height:50px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(45,106,79,.4);}
.fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* Year selector */
.year-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.year-tab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-weight:500;}
.year-tab.active{background:var(--green);color:#fff;border-color:var(--green);}
/* Customer order list */
.cust-orders{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
.cust-order-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--bg2);}
.cust-order-row:last-child{border-bottom:none;}
.cust-order-left{flex:1;}
.cust-order-item{font-size:12px;color:var(--text);font-weight:500;}
.cust-order-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.cust-order-right{text-align:right;flex-shrink:0;}
.cust-order-amt{font-size:13px;font-weight:600;color:var(--green);}
.cust-order-prod{font-size:10px;color:var(--text3);}
.cust-expand{font-size:11px;color:var(--green);cursor:pointer;margin-top:6px;display:inline-block;}
.collapsed .cust-order-row{display:none;}
.collapsed .cust-order-row:nth-child(-n+3){display:flex;}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text);}
.form-group{margin-bottom:11px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-size:14px;color:var(--text);outline:none;}
.form-input:focus{border-color:var(--green);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-primary{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-primary:active{opacity:.85;}
.btn-primary:disabled{background:var(--text3);cursor:not-allowed;}
.btn-cancel{width:100%;padding:10px;background:transparent;color:var(--text2);border:none;font-size:13px;cursor:pointer;margin-top:4px;}
.section-title{font-size:13px;font-weight:500;color:var(--text2);margin:4px 0 8px;}
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;opacity:.7;}
.icon-btn:hover{opacity:1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
/* 登入畫面 */
.login-screen{position:fixed;inset:0;background:var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:32px;}
.login-logo{font-size:64px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:.5px;}
.login-sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:48px;}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.login-card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.login-card-sub{font-size:12px;color:var(--text2);margin-bottom:20px;}
.google-btn{width:100%;padding:12px;background:#fff;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.google-btn:active{background:var(--bg2);}
.login-loading{font-size:13px;color:var(--text2);margin-top:12px;display:none;}
</style>
</head>
<body>
<!-- 密碼登入畫面 -->
<div id="pwScreen" style="display:none;position:fixed;inset:0;background:var(--green);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:32px;">
  <div style="font-size:56px;margin-bottom:12px;">🍃</div>
  <div style="font-size:24px;font-weight:700;color:#fff;letter-spacing:1px;">崧發茶園</div>
  <div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:36px;">管理系統</div>
  <div style="background:#fff;border-radius:18px;padding:26px 22px;width:100%;max-width:320px;">
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;text-align:center;">請輸入管理密碼</div>
    <input id="pwInput" type="password" placeholder="密碼" autocomplete="current-password"
      style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:16px;outline:none;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div id="pwError" style="display:none;font-size:12px;color:var(--red);margin-top:8px;text-align:center;">密碼錯誤，請再試一次</div>
    <button id="loginBtn" onclick="doLogin()"
      style="width:100%;padding:13px;margin-top:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;">登入</button>
  </div>
</div>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-logo">
        <span class="topbar-leaf">🍃</span>
        <div>
          <div class="topbar-name">崧發茶園</div>
          <div class="topbar-sub">管理系統</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="sync-btn" onclick="syncAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          同步
        </button>
        <button class="sync-btn" onclick="doLogout()" title="登出">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="tab-row">
      <div class="tab active" onclick="switchTab('dashboard')">總覽</div>
      <div class="tab" onclick="switchTab('orders')">訂單</div>
      <div class="tab" onclick="switchTab('customers')">客戶</div>
      <div class="tab" onclick="switchTab('stats')">統計</div>
      <div class="tab" onclick="switchTab('annual')">年報</div>
      <div class="tab" onclick="switchTab('items')">品項</div>
      <div class="tab" onclick="switchTab('purchase')">茶乾</div>
    </div>
  </div>

  <!-- 總覽 -->
  <div class="content active" id="tab-dashboard">
    <div id="dashboard-loading" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    <div id="dashboard-content" style="display:none">
      <div class="stat-grid" id="statsGrid"></div>
      <div class="chart-card"><div class="chart-title">近 6 個月營收（元）</div><div class="month-chart" id="monthChart"></div></div>
      <div class="chart-card">
        <div class="chart-title">訂單狀態分布</div>
        <div class="donut-row">
          <svg id="donutSvg" width="80" height="80" viewBox="0 0 80 80"></svg>
          <div class="legend" id="donutLegend"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 訂單 -->
  <div class="content" id="tab-orders">
    <div class="search-wrap"><input type="text" id="orderSearch" placeholder="搜尋客戶、品項…" oninput="domSearch('orderList',this.value)"></div>
    <div class="chips">
      <div class="chip active" onclick="setOrderFilter('all',this)">全部</div>
      <div class="chip" onclick="setOrderFilter('已出貨',this)">已出貨</div>
      <div class="chip" onclick="setOrderFilter('未出貨',this)">未出貨</div>
      <div class="chip" onclick="setOrderFilter('取消',this)">取消</div>
    </div>
    <div id="orderList" style="padding-bottom:72px;"></div>
  </div>

  <!-- 客戶 -->
  <div class="content" id="tab-customers">
    <div class="search-wrap"><input type="text" id="customerSearch" placeholder="搜尋姓名、電話、地址…" oninput="domSearch('customerList',this.value)"></div>
    <div id="customerList" style="padding-bottom:72px;"></div>
  </div>

  <!-- 統計 -->
  <div class="content" id="tab-stats">
    <div id="stats-loading" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    <div id="stats-content" style="display:none;padding-bottom:72px;">
      <div class="year-tabs" id="yearTabs"></div>
      <div class="chart-card"><div class="chart-title">各月營收 vs 淨利</div><div id="yearMonthChart"></div></div>
      <div class="chart-card"><div class="chart-title">品項銷售排行（總金額）</div><div id="productChart"></div></div>
      <div class="chart-card"><div class="chart-title">客戶消費排行</div><div id="customerChart"></div></div>
      <div class="chart-card"><div class="chart-title">年度總計</div><div id="yearSummary"></div></div>
    </div>
  </div>

  <!-- 年度報表 -->
  <div class="content" id="tab-annual">
    <div id="annual-loading" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    <div id="annual-content" style="display:none;padding-bottom:20px;"></div>
  </div>

  <!-- 品項統計 -->
  <div class="content" id="tab-items">
    <div class="search-wrap"><input type="text" placeholder="搜尋品項名稱…" oninput="domSearch('items-content',this.value)"></div>
    <div id="items-loading" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    <div id="items-content" style="display:none;padding-bottom:20px;"></div>
  </div>

  <!-- 茶乾購買 -->
  <div class="content" id="tab-purchase">
    <div class="search-wrap"><input type="text" placeholder="搜尋姓名、品項…" oninput="domSearch('purchase-content',this.value)"></div>
    <div id="purchase-loading" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    <div id="purchase-content" style="display:none;padding-bottom:72px;"></div>
  </div>
</div>

<!-- 全域 FAB，依目前分頁動作 -->
<div class="fab-wrap" id="globalFab" style="display:none;">
  <button class="fab" id="fabBtn" onclick="fabAction()" aria-label="新增">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxBgLNLVEuEYkKBwRIT3Ru29kuyYFIhIahm62BtnzLPCD211iAKevTmwqKQHMYuubDHsw/exec';

// ── DOM 直接搜尋（最可靠方式）──
function domSearch(containerId, q) {
  const sq = (q || '').trim().toLowerCase();
  const container = document.getElementById(containerId);
  if (!container) return;
  const cards = container.querySelectorAll('[data-search]');
  if (cards.length === 0) {
    // 沒有 data-search，用 innerText 代替
    const allCards = container.querySelectorAll('.rec-card');
    allCards.forEach(card => {
      card.style.display = (!sq || card.innerText.toLowerCase().includes(sq)) ? '' : 'none';
    });
    return;
  }
  cards.forEach(card => {
    const text = card.dataset.search.toLowerCase();
    card.style.display = (!sq || text.includes(sq)) ? '' : 'none';
  });
}

let orders = [];
let customers = [];
let annualData = [];
let itemsData = [];
let purchaseData = [];
let orderFilter = 'all';
let itemsLoaded = false;
let annualLoaded = false;
let purchaseLoaded = false;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── API 核心（密碼不存在程式碼中，由使用者輸入後計算 hash）──
let PW_HASH = null; // 登入後才有值

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('pwError');
  btn.disabled = true;
  btn.textContent = '驗證中…';
  errEl.style.display = 'none';
  try {
    const hash = await sha256(pw);
    const url = API + '?action=getAll&sheet=' + encodeURIComponent('客戶資料') + '&pwHash=' + hash;
    let res, text, data;
    try {
      res = await fetch(url, { redirect: 'follow' });
      text = await res.text();
    } catch(fetchErr) {
      throw new Error('fetch 失敗：' + fetchErr.message);
    }
    try {
      data = JSON.parse(text);
    } catch(e) {
      throw new Error('回應非 JSON：' + text.slice(0, 120));
    }
    if (data.error && data.code === 401) {
      errEl.textContent = '密碼錯誤（hash=' + hash.slice(0,8) + '…）';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登入';
      return;
    }
    if (data.error) {
      throw new Error('API 錯誤：' + data.error);
    }
    PW_HASH = hash;
    try { localStorage.setItem('songfa_pwhash', hash); } catch(e) {}
    document.getElementById('pwScreen').style.display = 'none';
    loadDashboard();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '登入';
  }
}

function doLogout() {
  PW_HASH = null;
  try { localStorage.removeItem('songfa_pwhash'); } catch(e) {}
  location.reload();
}

async function checkSavedLogin() {
  let saved = null;
  try { saved = localStorage.getItem('songfa_pwhash'); } catch(e) {}
  if (saved) {
    try {
      const url = API + '?action=getAll&sheet=' + encodeURIComponent('客戶資料') + '&pwHash=' + saved;
      const res = await fetch(url, { redirect: 'follow' });
      const text = await res.text();
      const data = JSON.parse(text);
      if (!data.error || data.code !== 401) {
        PW_HASH = saved;
        document.getElementById('pwScreen').style.display = 'none';
        loadDashboard();
        return;
      }
    } catch(e) {
      try { localStorage.removeItem('songfa_pwhash'); } catch(e2) {}
    }
  }
  document.getElementById('pwScreen').style.display = 'flex';
}

async function apiGet(params) {
  if (!PW_HASH) return { error: '尚未登入' };
  const p = { ...params, pwHash: PW_HASH };
  const qs = Object.entries(p).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
  const url = API + '?' + qs;
  const res = await fetch(url, { redirect: 'follow' });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { return { error: '回應異常：' + text.slice(0, 100) }; }
}

async function apiFetch(params) {
  return apiGet(params);
}

async function apiAddRow(sheet, fields) {
  return apiGet({ action: 'addRow', sheet, fields: JSON.stringify(fields) });
}

async function apiUpdateRow(sheet, rowIndex, fields) {
  return apiGet({ action: 'updateRow', sheet, rowIndex, fields: JSON.stringify(fields) });
}

async function apiDeleteRow(sheet, rowIndex) {
  return apiGet({ action: 'deleteRow', sheet, rowIndex });
}

function excelDateToStr(serial) {
  if (!serial || isNaN(serial)) return String(serial || '');
  const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
  return d.toISOString().slice(0, 10);
}

// ── 總覽 Dashboard ──
function buildDashboard() {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const monthOrders = orders.filter(o => {
    const d = new Date(o['日期']);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });

  const totalRevenue = monthOrders.reduce((s, o) => s + Number(o['總金額'] || 0), 0);
  const totalProfit = monthOrders.reduce((s, o) => s + Number(o['淨利'] || 0), 0);
  const pending = orders.filter(o => (o['訂單狀態'] || '') === '未出貨').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">本月營收</div><div class="stat-value green">$${totalRevenue.toLocaleString()}</div><div class="stat-sub">${monthOrders.length} 筆訂單</div></div>
    <div class="stat-card"><div class="stat-label">本月淨利</div><div class="stat-value green">$${Math.round(totalProfit).toLocaleString()}</div><div class="stat-sub">毛利率 ${totalRevenue ? Math.round(totalProfit / totalRevenue * 100) : 0}%</div></div>
    <div class="stat-card"><div class="stat-label">待出貨</div><div class="stat-value amber">${pending}</div><div class="stat-sub">筆訂單</div></div>
    <div class="stat-card"><div class="stat-label">客戶總數</div><div class="stat-value">${customers.length}</div><div class="stat-sub">已建檔</div></div>`;

  // 近6個月圖
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(thisYear, thisMonth - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: (d.getMonth() + 1) + '月' });
  }
  const monthData = months.map(m => ({
    label: m.label,
    val: orders.filter(o => {
      const d = new Date(o['日期']);
      return d.getFullYear() === m.year && d.getMonth() === m.month;
    }).reduce((s, o) => s + Number(o['總金額'] || 0), 0)
  }));
  const maxVal = Math.max(...monthData.map(m => m.val), 1);
  document.getElementById('monthChart').innerHTML = monthData.map((m, i) => `
    <div class="month-col">
      <div class="month-bar" style="height:${Math.round(m.val / maxVal * 68)}px;background:${i === 5 ? 'var(--green)' : '#9FD1B6'};"></div>
      <div class="month-lbl">${m.label}</div>
    </div>`).join('');

  // 甜甜圈
  const statusCount = { '已出貨': 0, '未出貨': 0, '取消': 0 };
  orders.forEach(o => { const s = o['訂單狀態'] || '未出貨'; if (statusCount[s] !== undefined) statusCount[s]++; });
  const total = Object.values(statusCount).reduce((a, b) => a + b, 0) || 1;
  const colors = { '已出貨': '#2D6A4F', '未出貨': '#D4A017', '取消': '#8B1A1A' };
  let offset = 0;
  const circumference = 2 * Math.PI * 28;
  let circles = '';
  Object.entries(statusCount).forEach(([k, v]) => {
    const frac = v / total;
    const dash = frac * circumference;
    circles += `<circle cx="40" cy="40" r="28" fill="none" stroke="${colors[k]}" stroke-width="14" stroke-dasharray="${dash.toFixed(1)} ${(circumference - dash).toFixed(1)}" stroke-dashoffset="${(-offset * circumference).toFixed(1)}" transform="rotate(-90 40 40)"/>`;
    offset += frac;
  });
  document.getElementById('donutSvg').innerHTML = `<circle cx="40" cy="40" r="28" fill="none" stroke="#E8F3EE" stroke-width="14"/>${circles}<text x="40" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2416">${Math.round(statusCount['已出貨'] / total * 100)}%</text>`;
  document.getElementById('donutLegend').innerHTML = Object.entries(statusCount).map(([k, v]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${colors[k]};"></div>${k} ${v} 筆</div>`).join('');
}

// ── 統計（以年為單位）──
function buildStats() {
  // 收集所有年份
  const yearSet = new Set();
  orders.forEach(o => {
    const y = o['日期'] ? new Date(o['日期']).getFullYear() : null;
    if (y && y > 2000) yearSet.add(y);
  });
  const years = [...yearSet].sort((a, b) => b - a);
  if (!selectedYear || !yearSet.has(selectedYear)) selectedYear = years[0];

  // 年份選擇器
  document.getElementById('yearTabs').innerHTML = years.map(y => `
    <div class="year-tab ${y === selectedYear ? 'active' : ''}" onclick="selectYear(${y})">${y} 年</div>
  `).join('');

  const yo = orders.filter(o => o['日期'] && new Date(o['日期']).getFullYear() === selectedYear);

  // 月度營收 vs 淨利長條圖
  const monthlyRev  = Array(12).fill(0);
  const monthlyProfit = Array(12).fill(0);
  yo.forEach(o => {
    const m = new Date(o['日期']).getMonth();
    monthlyRev[m]   += Number(o['總金額'] || 0);
    monthlyProfit[m]+= Number(o['淨利']   || 0);
  });
  const maxMV = Math.max(...monthlyRev, 1);
  document.getElementById('yearMonthChart').innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:3px;height:90px;margin-bottom:4px;">
      ${monthlyRev.map((v, i) => `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
          <div style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:72px;gap:1px;">
            <div style="width:60%;height:${Math.round(monthlyProfit[i]/maxMV*68)}px;background:#9FD1B6;border-radius:2px 2px 0 0;min-height:${monthlyProfit[i]>0?2:0}px;"></div>
            <div style="width:100%;height:${Math.round(v/maxMV*68)}px;background:var(--green);border-radius:2px 2px 0 0;opacity:.7;min-height:${v>0?2:0}px;"></div>
          </div>
          <div style="font-size:9px;color:var(--text3);">${i+1}月</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:4px;">
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);"><div style="width:10px;height:10px;background:var(--green);border-radius:2px;opacity:.7;"></div>營收</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);"><div style="width:10px;height:10px;background:#9FD1B6;border-radius:2px;"></div>淨利</div>
    </div>`;

  // 品項排行（該年）
  const prodMap = {};
  yo.forEach(o => { const k = o['品項']||'其他'; prodMap[k] = (prodMap[k]||0) + Number(o['總金額']||0); });
  const prods = Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxP = prods[0]?.[1]||1;
  document.getElementById('productChart').innerHTML = prods.length ? prods.map(([k,v]) => `
    <div class="bar-row">
      <div class="bar-lbl">${k}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/maxP*100)}%;background:var(--green);"><span class="bar-val">$${Math.round(v/1000)}k</span></div></div>
    </div>`).join('') : '<div class="empty">本年無資料</div>';

  // 客戶排行（該年）
  const custMap = {};
  yo.forEach(o => { const k = o['客戶資料']||'未知'; custMap[k] = (custMap[k]||0) + Number(o['總金額']||0); });
  const custs = Object.entries(custMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxC = custs[0]?.[1]||1;
  document.getElementById('customerChart').innerHTML = custs.length ? custs.map(([k,v],i) => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div style="font-size:12px;color:var(--text2);width:16px;">${i+1}</div>
      <div style="flex:1;">
        <div style="font-size:13px;color:var(--text);">${k}</div>
        <div style="height:4px;background:var(--bg2);border-radius:2px;margin-top:3px;"><div style="height:100%;width:${Math.round(v/maxC*100)}%;background:#9FD1B6;border-radius:2px;"></div></div>
      </div>
      <div style="font-size:12px;color:var(--text2);">$${Math.round(v).toLocaleString()}</div>
    </div>`).join('') : '<div class="empty">本年無資料</div>';

  // 年度總計橫排
  const yRev    = yo.reduce((s,o) => s + Number(o['總金額']||0), 0);
  const yProfit = yo.reduce((s,o) => s + Number(o['淨利']||0), 0);
  const yCount  = yo.length;
  const yMargin = yRev ? Math.round(yProfit/yRev*100) : 0;
  document.getElementById('yearSummary').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
      <div style="background:var(--bg2);border-radius:8px;padding:10px;">
        <div style="font-size:11px;color:var(--text2);">總營收</div>
        <div style="font-size:18px;font-weight:600;color:var(--green);">$${yRev.toLocaleString()}</div>
      </div>
      <div style="background:var(--bg2);border-radius:8px;padding:10px;">
        <div style="font-size:11px;color:var(--text2);">總淨利</div>
        <div style="font-size:18px;font-weight:600;color:${yProfit>=0?'var(--green)':'var(--red)'};">$${Math.round(yProfit).toLocaleString()}</div>
      </div>
      <div style="background:var(--bg2);border-radius:8px;padding:10px;">
        <div style="font-size:11px;color:var(--text2);">訂單數</div>
        <div style="font-size:18px;font-weight:600;color:var(--text);">${yCount} 筆</div>
      </div>
      <div style="background:var(--bg2);border-radius:8px;padding:10px;">
        <div style="font-size:11px;color:var(--text2);">毛利率</div>
        <div style="font-size:18px;font-weight:600;color:var(--amber);">${yMargin}%</div>
      </div>
    </div>`;
}

function selectYear(y) {
  selectedYear = y;
  buildStats();
}

// ── 年度報表 ──

    const rev    = Number(r['總營業額']||0);
    const profit = Number(r['總利潤']||0);
    const margin = rev ? Math.round(profit/rev*100) : 0;
    const teaJin = Number(r['年度茶葉銷量']||0);
    const bagPcs = Number(r['年度茶包銷量']||0);
    const buyJin = Number(r['年度購買總斤數']||0);

        <div style="font-size:12px;padding:3px 10px;border-radius:20px;background:${margin>=20?'var(--green-l)':'var(--amber-l)'};color:${margin>=20?'var(--green-t)':'var(--amber)'};">毛利率 ${margin}%</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;">
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">總營業額</div>
          <div style="font-size:17px;font-weight:600;color:var(--green);">$${Math.round(rev).toLocaleString()}</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">總利潤</div>
          <div style="font-size:17px;font-weight:600;color:${profit>=0?'var(--green)':'var(--red)'};">$${Math.round(profit).toLocaleString()}</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">茶葉銷量</div>
          <div style="font-size:17px;font-weight:600;color:var(--text);">${teaJin} 斤</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">茶包銷量</div>
          <div style="font-size:17px;font-weight:600;color:var(--text);">${bagPcs} 包</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">購買茶乾</div>
          <div style="font-size:17px;font-weight:600;color:var(--amber);">${buyJin} 斤</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);">茶乾支出</div>
          <div style="font-size:17px;font-weight:600;color:var(--amber);">$${Math.round(buyCost).toLocaleString()}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('annual-content').innerHTML = html;
}

// ── 品項統計 ──
let allItemsData = [];
function renderItems(data) {
  allItemsData = data;
  const years = [];
  if (data[0]) {
    Object.keys(data[0]).forEach(k => { if (/^\d{4}總數量$/.test(k)) years.push(k.replace('總數量','')); });
  }
  // 分茶葉/茶包
  const teaItems  = data.filter(r => r['單位']==='斤');
  const bagItems  = data.filter(r => r['單位']==='包');

  const buildTable = (list, title) => {
    if (!list.length) return '';
    return `
    <div class="chart-card" style="margin-bottom:12px;">
      <div class="chart-title">${title}</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:var(--bg2);">
              <th style="padding:6px 8px;text-align:left;color:var(--text2);white-space:nowrap;">品項</th>
              ${years.map(y=>`<th style="padding:6px 8px;text-align:right;color:var(--text2);">${y}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${list.map((r,i) => `
            <tr style="border-bottom:0.5px solid var(--bg2);background:${i%2?'':'var(--card)'};">
              <td style="padding:7px 8px;color:var(--text);font-weight:500;">${r['品項名稱']}</td>
              ${years.map(y => {
                const v = Number(r[y+'總數量']||0);
                return `<td style="padding:7px 8px;text-align:right;color:${v>0?'var(--text)':'var(--text3)'};">${v>0?v:'-'}</td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  };

  document.getElementById('items-content').innerHTML =
    buildTable(teaItems,'🍃 茶葉銷售（斤）') +
    buildTable(bagItems,'🫖 茶包銷售（包）');
}

function filterItems(q) {
  const sq = (q || '').trim();
  const list = sq ? allItemsData.filter(r => (r['品項名稱']||'').includes(sq)) : allItemsData;
  renderItems(list);
}

// ── 茶乾購買 ──
let allPurchaseData = [];
function renderPurchase(data) {
  allPurchaseData = data;
  // 統計各供應商總金額
  const supplierMap = {};
  data.forEach(r => {
    const name = r['姓名']||'未知';
    const total = Number(r['斤數']||0) * Number(r['價錢/斤']||0);
    supplierMap[name] = (supplierMap[name]||0) + total;
  });
  const suppliers = Object.entries(supplierMap).sort((a,b)=>b[1]-a[1]);
  const totalBuy  = data.reduce((s,r) => s + Number(r['斤數']||0) * Number(r['價錢/斤']||0), 0);
  const totalJin  = data.reduce((s,r) => s + Number(r['斤數']||0), 0);

  const summaryHtml = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;">
      <div class="stat-card"><div class="stat-label">購買總斤數</div><div class="stat-value amber">${totalJin} 斤</div></div>
      <div class="stat-card"><div class="stat-label">購買總金額</div><div class="stat-value amber">$${Math.round(totalBuy).toLocaleString()}</div></div>
    </div>
    <div class="chart-card" style="margin-bottom:12px;">
      <div class="chart-title">供應商排行</div>
      ${suppliers.map(([k,v],i) => {
        const maxV = suppliers[0][1]||1;
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div style="font-size:12px;color:var(--text2);width:16px;">${i+1}</div>
          <div style="flex:1;">
            <div style="font-size:13px;color:var(--text);">${k}</div>
            <div style="height:4px;background:var(--bg2);border-radius:2px;margin-top:3px;"><div style="height:100%;width:${Math.round(v/maxV*100)}%;background:var(--amber);border-radius:2px;opacity:.7;"></div></div>
          </div>
          <div style="font-size:12px;color:var(--amber);font-weight:500;">$${Math.round(v).toLocaleString()}</div>
        </div>`;
      }).join('')}
    </div>`;

  const listHtml = data.map(r => {
    const jin   = Number(r['斤數']||0);
    const price = Number(r['價錢/斤']||0);
    const total = jin * price;
    const idx   = r._rowIndex;
    return `<div class="rec-card">
      <div class="rec-top">
        <div class="rec-name">${r['姓名']||'未知'}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="rec-amount" style="color:var(--amber);">$${total?Math.round(total).toLocaleString():'—'}</div>
          <button onclick="editPurchase(${idx})" class="icon-btn" title="編輯">✏️</button>
          <button onclick="deletePurchase(${idx},'${(r['姓名']||'').replace(/'/g,'')}','${(r['品項']||'').replace(/'/g,'')}')" class="icon-btn" title="刪除">🗑️</button>
        </div>
      </div>
      <div class="rec-meta">
        <span class="rec-detail">${r['日期']||''}</span>
        <span class="rec-detail"><b>${r['品項']||''}</b></span>
        <span class="rec-detail">${jin?jin+'斤':''}</span>
        ${price?`<span class="rec-detail">$${price}/斤</span>`:''}
      </div>
      ${r['備註']?`<div class="rec-addr" style="margin-top:4px;">備註：${r['備註']}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('purchase-content').innerHTML = summaryHtml + listHtml;
}

function filterPurchase(q) {
  const sq = (q || '').trim();
  const list = sq ? allPurchaseData.filter(r =>
    (r['姓名']||'').includes(sq) || (r['品項']||'').includes(sq) || (r['日期']||'').includes(sq)
  ) : allPurchaseData;
  renderPurchase(list);
}

      <div class="form-group"><label class="form-label">烘焙</label><input class="form-input" id="eo_roast" type="number" value="${r['烘焙']||''}"></div>
      <div class="form-group"><label class="form-label">脫氧+鋁袋</label><input class="form-input" id="eo_deox" type="number" value="${r['脫氧+鋁袋']||''}"></div>
    </div>

      <div class="form-group"><label class="form-label">運費</label><input class="form-input" id="eo_ship" type="number" value="${r['運費']||0}"></div>

async function updateOrder(rowIndex) {
  const btn = document.getElementById('updateOrderBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  const r = orders.find(o => o._rowIndex === rowIndex);
  const data = {
    '訂單ID':        r['訂單ID']||'',
    '日期':          document.getElementById('eo_date').value,
    '客戶資料':      document.getElementById('eo_cust').value,
    '品項':          document.getElementById('eo_item').value,
    '價位':          document.getElementById('eo_price').value,
    '斤數':          document.getElementById('eo_qty').value,
    '總金額':        document.getElementById('eo_total').value,
    '產品編號':      document.getElementById('eo_prodid').value,
    '單斤成本':      document.getElementById('eo_cost').value,
    '茶葉*斤數成本': Number(document.getElementById('eo_qty').value||0)*Number(document.getElementById('eo_cost').value||0),
    '茶葉消耗':      r['茶葉消耗']||'',
    '烘焙':          document.getElementById('eo_roast').value,
    '脫氧+鋁袋':     document.getElementById('eo_deox').value,
    '箱子':          document.getElementById('eo_box').value,
    '運費':          document.getElementById('eo_ship').value,
    '手續費':        document.getElementById('eo_fee').value,
    '淨利':          document.getElementById('eo_profit').value,
    '備註':          document.getElementById('eo_note').value,
    '訂單狀態':      document.getElementById('eo_status').value,
  };
  try {
    const res = await apiUpdateRow('訂單紀錄', rowIndex, data);
    if (res.error) throw new Error(res.error);
    showToast('✓ 訂單已更新');
    closeModal();
    await loadOrders();
  } catch(e) {
    showToast('錯誤：' + e.message);
    btn.disabled = false; btn.textContent = '儲存變更';
  }
}

function deleteOrder(rowIndex, name, item) {
  confirmDelete(`確定要刪除「${name} — ${item}」這筆訂單嗎？此操作無法復原。`, async () => {
    showToast('刪除中…');
    try {
      const res = await apiDeleteRow('訂單紀錄', rowIndex);
      if (res.error) throw new Error(res.error);
      showToast('✓ 訂單已刪除');
      await loadOrders();
    } catch(e) { showToast('錯誤：' + e.message); }
  });
}

async function updateCustomer(rowIndex) {
  const btn = document.getElementById('updateCustBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  const c = customers.find(c => c._rowIndex === rowIndex);
  const data = {
    'ID':           c['ID']||'',
    '電話':         document.getElementById('ec_phone').value,
    '客戶姓名':     document.getElementById('ec_name').value,
    'Line名稱':     document.getElementById('ec_line').value,
    '口味偏好/備註':document.getElementById('ec_note').value,
    '地址':         document.getElementById('ec_addr').value,
    '建檔日期':     c['建檔日期']||'',
  };

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['dashboard','orders','customers','stats','annual','items','purchase'][i] === tab);
  });
  const fab = document.getElementById('globalFab');
  fab.style.display = (tab === 'orders' || tab === 'customers' || tab === 'purchase') ? '' : 'none';

  if (tab === 'orders') {
    if (orders.length === 0) loadOrders(); else filterOrders('');
  }
  if (tab === 'customers') {
    if (customers.length === 0) loadCustomers(); else filterCustomers('');
  }
  if (tab === 'stats')    loadStats();
  if (tab === 'annual')   loadAnnual();
  if (tab === 'items')    loadItems();
  if (tab === 'purchase') loadPurchase();
}

// 自動計算淨利（依照 Excel 公式邏輯）
function calcProfit() {
  const price  = parseFloat(document.getElementById('o_price')?.value) || 0;
  const qty    = parseFloat(document.getElementById('o_qty')?.value)   || 0;
  const cost   = parseFloat(document.getElementById('o_cost')?.value)  || 0;
  const item   = (document.getElementById('o_item')?.value || '').toLowerCase();
  const isBag  = item.includes('茶包');

  // 總金額自動填入
  const total = price * qty;
  if (document.getElementById('o_total') && price > 0 && qty > 0)
    document.getElementById('o_total').value = total;

  // 茶葉*斤數成本
  const leafCost = qty * cost;
  if (document.getElementById('o_leafcost'))
    document.getElementById('o_leafcost').value = leafCost || '';

  // 茶葉消耗、烘焙、脫氧（每斤固定值，可手動覆蓋）
  const perJin = 50;
  const deoxPerJin = 16;
  if (qty > 0) {
    const luEl = document.getElementById('o_leafuse');
    const roEl = document.getElementById('o_roast');
    const dxEl = document.getElementById('o_deox');
    if (luEl && luEl.value === '') luEl.value = (qty * perJin).toFixed(2);
    if (roEl && roEl.value === '') roEl.value = (qty * perJin).toFixed(2);
    if (dxEl && dxEl.value === '') dxEl.value = (qty * deoxPerJin).toFixed(2);
  }

  const leafUse = parseFloat(document.getElementById('o_leafuse')?.value) || 0;
  const roast   = parseFloat(document.getElementById('o_roast')?.value)   || 0;
  const deox    = parseFloat(document.getElementById('o_deox')?.value)    || 0;
  const box     = parseFloat(document.getElementById('o_box')?.value)     || 0;
  const ship    = parseFloat(document.getElementById('o_ship')?.value)    || 0;
  const fee     = parseFloat(document.getElementById('o_fee')?.value)     || 0;

  let profit;
  if (isBag) {
    // 茶包：總金額 - 茶葉成本 - 箱子 - 運費 - 手續費
    profit = total - leafCost - box - ship - fee;
  } else {
    // 一般茶：總金額 - 茶葉成本 - 茶葉消耗 - 烘焙 - 脫氧 - 箱子 - 運費 - 手續費
    profit = total - leafCost - leafUse - roast - deox - box - ship - fee;
  }

  const el = document.getElementById('profitDisplay');
  if (el) {
    el.textContent = '$' + Math.round(profit).toLocaleString();
    el.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';
  }
}

async function saveOrder() {
  const btn = document.getElementById('saveOrderBtn');

  btn.textContent = '儲存中…';

  const leafUse  = parseFloat(document.getElementById('o_leafuse').value) || 0;
  const roast    = parseFloat(document.getElementById('o_roast').value)   || 0;
  const deox     = parseFloat(document.getElementById('o_deox').value)    || 0;
  const box      = parseFloat(document.getElementById('o_box').value)     || 0;
  const ship     = parseFloat(document.getElementById('o_ship').value)    || 0;

    '茶葉消耗':     leafUse,
    '烘焙':         roast,
    '脫氧+鋁袋':    deox,
    '箱子':         box,
    '運費':         ship,
    '手續費':       fee,
